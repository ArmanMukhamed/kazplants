{% load i18n %}
<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block meta_title %}Kazplants{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}{% trans 'Магазин растений с доставкой по Казахстану' %}{% endblock %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/site.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-light border-bottom mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'shop:home' %}">Kazplants</a>
      <div class="d-flex gap-3 align-items-center flex-wrap">
        <a class="nav-link" href="{% url 'shop:catalog' %}">{% trans "Каталог" %}</a>
        <a class="nav-link" href="{% url 'shop:categories' %}">{% trans "Категории" %}</a>
        <a class="nav-link" href="{% url 'shop:about' %}">{% trans "О компании" %}</a>
        <a class="nav-link" href="{% url 'shop:contacts' %}">{% trans "Контакты" %}</a>
        <form action="{% url 'set_language' %}" method="post" class="d-flex align-items-center gap-2">
          {% csrf_token %}
          <input name="next" type="hidden" value="{{ request.get_full_path }}">
          <select name="language" class="form-select form-select-sm" onchange="this.form.submit()">
            {% get_current_language as LANGUAGE_CODE %}
            {% get_available_languages as LANGUAGES %}
            {% for code, name in LANGUAGES %}
              <option value="{{ code }}" {% if code == LANGUAGE_CODE %}selected{% endif %}>{{ code|upper }}</option>
            {% endfor %}
          </select>
        </form>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
